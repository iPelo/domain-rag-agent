services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: germanlawrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: germanlawrag-postgres
    environment:
      POSTGRES_USER: germanlawrag
      POSTGRES_PASSWORD: germanlawrag
      POSTGRES_DB: germanlawrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  postgres_data:
